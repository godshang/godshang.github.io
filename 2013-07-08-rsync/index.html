        <p>Rsync的参数详细解释</p>
<figure class="highlight haml"><table><tr><td class="code"><pre><span class="line">-<span class="ruby">v, --verbose 详细模式输出</span></span><br><span class="line"><span class="ruby">-q, --quiet 精简输出模式</span></span><br><span class="line"><span class="ruby">-c, --checksum 打开校验开关，强制对文件传输进行校验</span></span><br><span class="line"><span class="ruby">-a, --archive 归档模式，表示以递归方式传输文件，并保持所有文件属性，等于-rlptgoD</span></span><br><span class="line"><span class="ruby">-r, --recursive 对子目录以递归模式处理</span></span><br><span class="line"><span class="ruby">-R, --relative 使用相对路径信息</span></span><br><span class="line"><span class="ruby">-b, --backup 创建备份，也就是对于目的已经存在有同样的文件名时，将老的文件重新命名为~filename。可以使用--suffix选项来指定不同的备份文件前缀。</span></span><br><span class="line"><span class="ruby">--backup-dir 将备份文件(如~filename)存放在在目录下。</span></span><br><span class="line"><span class="ruby">-suffix=SUFFIX 定义备份文件前缀</span></span><br><span class="line"><span class="ruby">-u, --update 仅仅进行更新，也就是跳过所有已经存在于DST，并且文件时间晚于要备份的文件。(不覆盖更新的文件)</span></span><br><span class="line"><span class="ruby">-l, --links 保留软链结</span></span><br><span class="line"><span class="ruby">-L, --copy-links 想对待常规文件一样处理软链结</span></span><br><span class="line"><span class="ruby">--copy-unsafe-links 仅仅拷贝指向SRC路径目录树以外的链结</span></span><br><span class="line"><span class="ruby">--safe-links 忽略指向SRC路径目录树以外的链结</span></span><br><span class="line"><span class="ruby">-H, --hard-links 保留硬链结</span></span><br><span class="line"><span class="ruby">-p, --perms 保持文件权限</span></span><br><span class="line"><span class="ruby">-o, --owner 保持文件属主信息</span></span><br><span class="line"><span class="ruby">-g, --group 保持文件属组信息</span></span><br><span class="line"><span class="ruby">-D, --devices 保持设备文件信息</span></span><br><span class="line"><span class="ruby">-t, --times 保持文件时间信息</span></span><br><span class="line"><span class="ruby">-S, --sparse 对稀疏文件进行特殊处理以节省DST的空间</span></span><br><span class="line"><span class="ruby">-n, --dry-run 现实哪些文件将被传输</span></span><br><span class="line"><span class="ruby">-W, --whole-file 拷贝文件，不进行增量检测</span></span><br><span class="line"><span class="ruby">-x, --one-file-system 不要跨越文件系统边界</span></span><br><span class="line"><span class="ruby">-B, --block-size=SIZE 检验算法使用的块尺寸，默认是<span class="number">700</span>字节</span></span><br><span class="line"><span class="ruby">-e, --rsh=COMMAND 指定使用rsh、ssh方式进行数据同步</span></span><br><span class="line"><span class="ruby">--rsync-path=PATH 指定远程服务器上的rsync命令所在路径信息</span></span><br><span class="line"><span class="ruby">-C, --cvs-exclude 使用和CVS一样的方法自动忽略文件，用来排除那些不希望传输的文件</span></span><br><span class="line"><span class="ruby">--existing 仅仅更新那些已经存在于DST的文件，而不备份那些新创建的文件</span></span><br><span class="line"><span class="ruby">--delete 删除那些DST中SRC没有的文件</span></span><br><span class="line"><span class="ruby">--delete-excluded 同样删除接收端那些被该选项指定排除的文件</span></span><br><span class="line"><span class="ruby">--delete-after 传输结束以后再删除</span></span><br><span class="line"><span class="ruby">--ignore-errors 及时出现IO错误也进行删除</span></span><br><span class="line"><span class="ruby">--max-delete=NUM 最多删除NUM个文件</span></span><br><span class="line"><span class="ruby">--partial 保留那些因故没有完全传输的文件，以是加快随后的再次传输</span></span><br><span class="line"><span class="ruby">--force 强制删除目录，即使不为空</span></span><br><span class="line"><span class="ruby">--numeric-ids 不将数字的用户和组ID匹配为用户名和组名</span></span><br><span class="line"><span class="ruby">--timeout=TIME IP 超时时间，单位为秒</span></span><br><span class="line"><span class="ruby">-I, --ignore-times 不跳过那些有同样的时间和长度的文件</span></span><br><span class="line"><span class="ruby">--size-only 当决定是否要备份文件时，仅仅察看文件大小而不考虑文件时间</span></span><br><span class="line"><span class="ruby">--modify-window=NUM 决定文件是否时间相同时使用的时间戳窗口，默认为<span class="number">0</span></span></span><br><span class="line"><span class="ruby">-T --temp-dir=DIR 在DIR中创建临时文件</span></span><br><span class="line"><span class="ruby">--compare-dest=DIR 同样比较DIR中的文件来决定是否需要备份</span></span><br><span class="line"><span class="ruby">-P 等同于 --partial</span></span><br><span class="line"><span class="ruby">--progress 显示备份过程</span></span><br><span class="line"><span class="ruby">-z, --compress 对备份的文件在传输时进行压缩处理</span></span><br><span class="line"><span class="ruby">--exclude=PATTERN 指定排除不需要传输的文件模式</span></span><br><span class="line"><span class="ruby">--<span class="keyword">include</span>=PATTERN 指定不排除而需要传输的文件模式</span></span><br><span class="line"><span class="ruby">--exclude-from=FILE 排除FILE中指定模式的文件</span></span><br><span class="line"><span class="ruby">--<span class="keyword">include</span>-from=FILE 不排除FILE指定模式匹配的文件</span></span><br><span class="line"><span class="ruby">--version 打印版本信息</span></span><br><span class="line"><span class="ruby">--address 绑定到特定的地址</span></span><br><span class="line"><span class="ruby">--config=FILE 指定其他的配置文件，不使用默认的rsyncd.conf文件</span></span><br><span class="line"><span class="ruby">--port=PORT 指定其他的rsync服务端口</span></span><br><span class="line"><span class="ruby">--blocking-io 对远程shell使用阻塞IO</span></span><br><span class="line"><span class="ruby">-stats 给出某些文件的传输状态</span></span><br><span class="line"><span class="ruby">--progress 在传输时现实传输过程</span></span><br><span class="line"><span class="ruby">--log-format=formAT 指定日志文件格式</span></span><br><span class="line"><span class="ruby">--password-file=FILE 从FILE中得到密码</span></span><br><span class="line"><span class="ruby">--bwlimit=KBPS 限制I/O带宽，KBytes per second</span></span><br><span class="line"><span class="ruby">-h, --help 显示帮助信息</span></span><br></pre></td></tr></table></figure>
